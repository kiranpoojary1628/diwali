<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Happy Diwali</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --light-gold-1: #fbf1c7;
    --light-gold-2: #f7e49a;
  }
  html,body{
    height:100%;
    margin:0;
    font-family:"Poppins",sans-serif;
  }
  .screen{
    width:100%;
    height:100vh;
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
  }
  /* PAGE 1 */
  #page1{
    background:linear-gradient(135deg,var(--light-gold-1),var(--light-gold-2));
    transition:opacity .6s ease;
  }
  #nameInput{
    padding:12px 18px;
    font-size:1.1rem;
    border-radius:10px;
    border:none;
    outline:none;
    margin-bottom:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.15);
    text-align:center;
  }
  .enter-btn{
    border:none;
    background:linear-gradient(180deg,#ffd54a,#f6c024);
    color:#3b2300;
    font-weight:700;
    font-size:1.2rem;
    padding:12px 30px;
    border-radius:14px;
    cursor:pointer;
    box-shadow:0 6px 16px rgba(183,115,0,0.18);
    transition:.2s;
  }
  .enter-btn:hover{background:linear-gradient(180deg,#ffe066,#f7ca39);}
  .leaf{
    position:absolute;
    width:36px;
    height:22px;
    background-repeat:no-repeat;
    background-size:contain;
    opacity:0.9;
    pointer-events:none;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,0.1));
    background-image:url("data:image/svg+xml;utf8,\
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 40'>\
      <defs><linearGradient id='g' x1='0' x2='1'><stop stop-color='%233b9b00' offset='0'/><stop stop-color='%2396c11f' offset='1'/></linearGradient></defs>\
      <path d='M2 20 C16 2, 48 2, 62 20 C48 34, 16 38, 2 20 Z' fill='url(%23g)' stroke='%23284e00' stroke-width='1'/>\
    </svg>");
  }

  /* PAGE 2 */
  #page2{
    background:radial-gradient(circle at 30% 20%,#241218 0%,#0d0b10 40%,#020203 100%);
    color:#ffd86b;
    display:none;
    flex-direction:column;
  }
  #greet{
    font-family:"Great Vibes",cursive;
    font-size:clamp(36px,8vw,92px);
    color:#ffd86b;
    text-shadow:0 0 20px rgba(255,200,80,0.25);
    user-select:none;
  }
  #sub{
    margin-top:8px;
    font-size:14px;
    color:rgba(255,215,120,0.8);
  }
  #fireworkCanvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    z-index:10;
  }
</style>
</head>
<body>

<!-- PAGE 1 -->
<div id="page1" class="screen">
  <!-- Two diyas and Diwali text in the middle -->
  <div style="display:flex; align-items:center; gap:20px; margin-bottom:20px; z-index:50;">
    <img src="https://cdn-icons-png.flaticon.com/512/3193/3193762.png" alt="Diya" style="width:50px; height:50px;">
    <span style="font-family:'Great Vibes', cursive; font-size:2.5rem; font-weight:bold; color:#b77300;">Diwali</span>
    <img src="https://cdn-icons-png.flaticon.com/512/3193/3193762.png" alt="Diya" style="width:50px; height:50px;">
  </div>

  <!-- Name input -->
  <input id="nameInput" type="text" placeholder="Enter your name..." />
  <!-- Button changed to Celebrate -->
  <button id="enter" class="enter-btn">Celebrate</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="screen">
  <div style="z-index:40;text-align:center;">
    <h1 id="greet">Happy Diwali!</h1>
    <div id="sub">Click anywhere to pop fireworks</div>
  </div>
  <canvas id="fireworkCanvas"></canvas>
  <audio id="fw-sound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_d7b849a17d.mp3?filename=fireworks-14616.mp3"></audio>
</div>

<script>
/* Leaves animation */
(function(){
  const page1=document.getElementById('page1');
  for(let i=0;i<20;i++){
    const leaf=document.createElement('div');
    leaf.className='leaf';
    leaf.style.left=Math.random()*100+'vw';
    leaf.style.top=Math.random()*-20+'vh';
    leaf.style.animation=`fall${i} ${8+Math.random()*5}s linear infinite`;
    page1.appendChild(leaf);
    const keyframes=`@keyframes fall${i}{
      0%{transform:translateY(0) rotate(0deg);opacity:1;}
      100%{transform:translateY(110vh) rotate(${Math.random()*360}deg);opacity:.4;}
    }`;
    const style=document.createElement('style');
    style.innerHTML=keyframes;
    document.head.appendChild(style);
  }
})();

/* Switch pages */
const enterBtn=document.getElementById('enter');
const nameInput=document.getElementById('nameInput');
const page1=document.getElementById('page1');
const page2=document.getElementById('page2');
const greet=document.getElementById('greet');
const canvas=document.getElementById('fireworkCanvas');
const sound=document.getElementById('fw-sound');

enterBtn.addEventListener('click',()=>{
  const name=nameInput.value.trim();
  greet.textContent=name?`Happy Diwali ${name}!`:"Happy Diwali!";
  page1.style.display='none';
  page2.style.display='flex';
  fitCanvas();
});

/* Fireworks */
(function fireworks(){
  const ctx=canvas.getContext('2d');
  let particles=[];
  const colors=['#ff4d4d','#ffd24d','#4dff88','#4dd2ff','#b84dff','#ff77b8','#ffd700'];
  function fitCanvas(){
    canvas.width=innerWidth;
    canvas.height=innerHeight;
  }
  window.fitCanvas=fitCanvas;
  function Particle(x,y,vx,vy,color){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.color=color;this.life=80+Math.random()*20;
  }
  Particle.prototype.update=function(){
    this.vy+=0.05;this.x+=this.vx;this.y+=this.vy;this.life--;
  };
  Particle.prototype.draw=function(){
    ctx.beginPath();
    ctx.fillStyle=this.color;
    ctx.globalAlpha=Math.max(this.life/100,0);
    ctx.arc(this.x,this.y,3,0,Math.PI*2);
    ctx.fill();
  };
  function explode(x,y){
    for(let i=0;i<40;i++){
      const angle=Math.random()*2*Math.PI;
      const speed=Math.random()*5;
      const color=colors[Math.floor(Math.random()*colors.length)];
      particles.push(new Particle(x,y,Math.cos(angle)*speed,Math.sin(angle)*speed,color));
    }
    sound.currentTime=0;sound.play();
  }
  canvas.addEventListener('click',e=>explode(e.clientX,e.clientY));
  function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach((p,i)=>{
      p.update();p.draw();
      if(p.life<=0)particles.splice(i,1);
    });
    requestAnimationFrame(loop);
  }
  fitCanvas();loop();
})();
window.addEventListener('resize',()=>window.fitCanvas());
</script>
</body>
</html>
